    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0612"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <text x="32" y="40" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#g)" filter="url(#glow)">VI</text>
